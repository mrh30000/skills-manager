name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'CHANGELOG*.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - 'CHANGELOG*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Build frontend bundle
        run: npm run build

      - name: Build Tauri installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }} --ci

      - name: Collect installer artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found at $BUNDLE_DIR" >&2
            exit 1
          fi
          # Copy every produced installer/archive — Tauri layout differs per OS,
          # so a flat find-and-copy keeps this matrix entry agnostic.
          find "$BUNDLE_DIR" -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.AppImage' \
            -o -name '*.deb' -o -name '*.rpm' -o -name '*.msi' \
            -o -name '*.exe' -o -name '*.sig' \) \
            -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: skills-manager-${{ matrix.label }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
